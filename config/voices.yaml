# voices.yaml — the voice registry (D9.2): logical voice -> vendor preset, per engine.
#
# HUMAN-EDITED source of truth (like pronunciation.yaml): adding a DJ means one
# entry here + a card in docs/canon/90-cast.md — NO code change (the old
# hardcoded dicts in src/providers/tts.py are gone). The loader re-reads on
# file change. `make seed-canon` FAILS LOUD if a cast card names a logical
# voice that has no entry here, so a missing mapping is caught at seed time,
# not at a 3 a.m. render.
#
# Engines:
#   kokoro      — Kokoro-82M preset ids (first letter = language a/b, second =
#                 gender m/f). List them via KPipeline / the model card. All the
#                 presets below are VERIFIED rendering locally (D9.2).
#   elevenlabs  — vendor voice ids. The two originals ("Adam", "Rachel") are in
#                 use since Phase A/B; the 8 NEW ids below are the documented
#                 ElevenLabs premade roster, assigned by card fit but NOT yet
#                 heard (the operator key lacks `voices_read`, and rendering
#                 costs credits) — CONFIRM/REPICK at the C6 funded listen.
#   say         — macOS built-in voices (test backend only; `say -v '?'`).
#                 Rough stand-ins, chosen distinct so multi-DJ segments read as
#                 different people.
#
# Every entry must define all three engines; a render on an engine with no
# mapping fails loud (by design — never a silent wrong voice).

vell_night:            # Vell — warm, low, unhurried (the night shift)
  kokoro: bm_george
  elevenlabs: pNInz6obpgDQGcFmaJgB   # "Adam" — in use since Phase A
  say: Daniel

