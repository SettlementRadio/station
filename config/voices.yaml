# --- Guest voice pool (D9.3) -------------------------------------------------
# NOT DJs: the voices for temporary, non-host speakers — a D10 figure voiced as
# a soundbite, or a one-off invited guest. A figure with its own `voice_id` (a
# logical name from THIS file) uses that; otherwise the room assigns a pool
# voice by a stable hash of the figure, so the same person keeps the same voice
# across segments. All presets distinct from every host's. Kokoro picks are
# verified locally; ElevenLabs ids are premade-roster picks (C6: confirm);
# `say` values are rough test stand-ins.

