# config/tracks.yaml — Settlement Radio curated music-lore manifest
#
# The human-owned catalogue of PLAYABLE songs (curated, not tick-generated). This file is the
# authoritative source the D7.0 loader reads into the `tracks` table (`make seed-tracks`). It is
# pre-authored from docs/MEDIA_LIBRARY.md §5/§6 — the loader must READ THIS FILE/FORMAT, not invent
# its own. Survives a canon refresh (curated config/catalog, not world state — OVERVIEW §2a).
#
# WORKFLOW (see docs/MEDIA_LIBRARY.md):
#   1. Human generates each song in Suno (Style + Lyrics per doc §5) and saves the MP3 into
#      assets/music/ under the EXACT filename in `audio_path` below. That string is the only link
#      between file and lore — nothing is discovered by scanning the folder.
#   2. `duration_sec` is null until the trimmed file exists; the loader may probe it (tts.probe_duration)
#      or the human stamps it. A row whose audio_path file is missing is NOT playable (skip, don't crash).
#   3. `artist_figure_id` is null now (D7 ships text-only artists); backfilled to a D10 figure row later.
#
# A song not yet generated: leave its row here (duration_sec null, file absent) — it simply isn't
# playable until the file lands. It stays referenceable lore either way.

licence_default: "Suno Pro — commercial rights, self-owned; cleared for broadcast (confirm plan terms before air)."

