# grid.yaml — Settlement Radio weekly programming grid (GRID_V2 · R2.2)
#
# The human-edited source of truth for WHICH SHOW AIRS WHEN. Edit this file and the
# next scheduler top-up airs it — the grid is read LIVE (an mtime-cached loader in
# src/world/programming.py; no seed step). See README.md for the model + clock grammar,
# and docs/programming/GRID_V2.md for the SIGNED-OFF design this file implements
# (operator, 2026-07-19) — the rationale, the tiling proof, and the rota live there.
#
# In-world wall clock == real wall clock (the world clock shifts the YEAR only), so
# slots are plain weekday + HH:MM-HH:MM ranges (15-minute granularity is legal). The
# grid must tile the week with no gaps; the reserved `default` program backstops any
# hole so the scheduler never stalls.
#
# ─────────────────────────────────────────────────────────────────────────────
# THE GRID_V2 SHAPE (the real-radio speech-station day):
#   • TWO 2-HOUR FLAGSHIPS — breakfast (07-09) and drive (18-20) — restructured
#     inside into fast 3-5-minute items around news@:00/news@:30 pins
#     (talk_length_sec: 240).
#   • EVERYTHING ELSE DAYTIME IS ≤30 MINUTES, at the same time every day (the
#     fixture rule): magazines, twice-daily Conditions+Ledger updates, sport, the
#     chart, dispatches, letters. 30-min specialists run ~6-8-min items
#     (talk_length_sec: 420); the 15-min desks run short reads (180).
#   • FIVE ROTATING VERTICAL WINDOWS (09:30 / 10:00 / 13:30 / 14:00 / 14:30) — each
#     vertical owns ONE canonical time; the weekday pattern picks its days — plus
#     the 15:30 WEEKLY BELT (Fit / Bridge / Relay Round / Deep Listening /
#     Gathering).
#   • THE NIGHT IS UNCHANGED (the one edit: The Serial takes 20:00-20:15 and
#     Nightfall starts 20:15). No 20:00 bulletin by design (drive was wall-to-wall
#     news; next bulletin 21:00) — signed off, GRID_V2 §10.
#
# ─────────────────────────────────────────────────────────────────────────────
# FORMAT & VOICES — read the `hosts` + the `[fmt]` tag on each show:
#   • [desk]      a single anchor reading — the `news` bulletin is ALWAYS the
#                 dedicated news desk (Thorn — settings.news_anchor_ids), never the
#                 show's host; it cuts in on the hour and hands back.
#   • [duo]       a TWO-DJ conversation (the `talk` format needs ≥2 hosts, lead
#                 first — a one-host talk show falls back to the default cast).
#   • [interview] a duo that regularly brings in a GUEST — an invited in-world
#                 figure (a governor, a trader, an artist) for a short interview.
#   • [dispatch]  a duo that regularly plays a RECORD — an attributable soundbite
#                 from a story figure, or a field recording from a correspondent
#                 (Sera/Zhe/Orin send dispatches across the relay, lag and all).
#                 NOTE: field hosts are enforced by the CAST CARD, not this file —
#                 any host whose card says `Based: field` (Sera/Orin/Zhe) is
#                 automatically written as a stitched relay dispatch (never live
#                 in the booth) on ANY show you schedule them on.
#   • [music]     a single DJ (intro → a real track → back-announce).
#
# `guest_chance` (0..1, D12.4) sets how often a talk show runs that guest/record —
# it overrides the global convo_guest_chance. The guest KIND is automatic: a played
# soundbite when the hour's stories carry an attributable quote, else an invited
# persona. (Guests only ever join `talk` segments; music/news ignore it.)
#
# `break_every: N` (D8.1) — sparse ad-break cadence; 30-min shows take at most one
# (break_every: 4); the 15-min desks, handovers and deep night stay break-free.
#
# `brief` + `energy` (R1.0/R1.1) — the show's EDITORIAL IDENTITY, threaded into the
# writers' room as the per-call "ON THIS SHOW" block. A brief is 2–4 sentences written
# for INTEREST, not theme: concrete stakes plus an explicit "never" line. `energy` is
# the delivery-pace hint: calm | steady | bright (it also drives the R1.2 register
# rules — daytime steady/bright bans the house poetry; calm licenses it).
#
# `talk_length_sec` (R2.2) — this show's talk-ITEM length target: flagships 240
# (fast items), 30-min specialists 420, the 15-min desks 180. Absent = the global
# `segment_default_length_target_sec`. The word budget scales with it — length is a
# parameter, never a constant (Seam #2).
# ─────────────────────────────────────────────────────────────────────────────

programs:
  # ══ NEWS & CURRENT AFFAIRS — the day's spine ═════════════════════════════════
  morning_currents:
    name: "Morning Currents"     # [interview] breakfast FLAGSHIP; fast items; an analyst pressed for specifics
    hosts: [thorn, wren]
    framing: ensemble
    daypart: morning
    clock: [news@:00, talk, talk, news@:30, talk, talk]
    break_every: 6
    guest_chance: 0.3
    energy: bright
    talk_length_sec: 240
    brief: >-
      The breakfast desk: what changed overnight and what it costs today — a price
      moved, a convoy due, a vote still crossing the relays, weather over the lanes.
      Move every few minutes: short items, quick takes, then on; the analyst is there
      to be pressed for specifics, not to lecture. A listener is starting a shift —
      tell them what they need before the door. Never open with philosophy; never
      muse about the light or the distance.

  settlement_desk:
    name: "The Settlement Desk"   # [dispatch] the LONG midday bulletin + a field record from Sera
    hosts: [thorn, sera]
    framing: ensemble
    daypart: midday
    clock: [news@:00, talk, talk]
    break_every: 6
    guest_chance: 0.5
    energy: steady
    talk_length_sec: 240
    brief: >-
      The midday desk: the day's stories at the halfway mark — what moved since
      breakfast, what the afternoon will decide — plus a field record from one real
      place: a dock, a hearing, a market queue. Keep items short and keep them
      advancing. Never re-read the morning — say what's new since; never explain the
      world to the people living in it.

  evening_currents:
    name: "Evening Currents"      # [interview] drive FLAGSHIP — Kael + Joss (R2.2 rota fix); Thorn keeps every bulletin
    hosts: [kael, joss]
    framing: ensemble
    daypart: evening
    clock: [news@:00, talk, talk, news@:30, talk, talk]
    break_every: 6
    guest_chance: 0.3
    energy: bright
    talk_length_sec: 240
    brief: >-
      Drive time: the day closed out — who won, who lost, what it cost, what
      tomorrow inherits. Move every few minutes, mix verdicts with quick reactions,
      and let the hosts call it as they see it. Never drift into evening reverie —
      that is the night's job; this desk ends the working day awake.

  conditions:
    name: "Conditions"            # [desk] the between-worlds weather report — Zhe from the far edge; 2x daily
    hosts: [zhe]
    framing: solo
    daypart: update
    clock: [news@:00, talk]
    energy: calm
    talk_length_sec: 180
    brief: >-
      Relay strength, particle weather over the lanes, crossing windows opening and
      closing, the queue at the transfer points — the between-worlds weather report,
      from the far-edge watch. Someone is planning a crossing on this: give the
      numbers, the windows, the delays, plainly. A little vastness is allowed — it
      IS vast out there. Never bury the practical in the poetry; the window times
      come first.

  the_ledger:
    name: "The Ledger"            # [desk] the markets brief — Joss, dry and exact; 2x daily (AM + the close)
    hosts: [joss]
    framing: solo
    daypart: update
    clock: [talk]
    energy: steady
    talk_length_sec: 180
    brief: >-
      The markets in ten minutes: today's prices, freight rates, a contract signed
      or defaulted, what the Exchange Houses are quoting on the morning relays. Name
      the cargo, the port, the number, the direction it moved — and who that
      squeezes. Never explain what a market is, and never pad: say the numbers and
      get out.

  common_ground:
    name: "Common Ground"         # [interview] daily life across the worlds; an ordinary resident on air
    hosts: [wren, mira]
    framing: ensemble
    daypart: morning
    clock: [news@:00, talk, talk, talk]
    break_every: 5
    guest_chance: 0.6
    energy: bright
    talk_length_sec: 420
    brief: >-
      Ordinary life, taken seriously: a broken air filter, a rec-hall wedding, a
      shift dispute, the food queue, someone's terrible week — often with the
      resident it happened to on air. The stakes are small and real; treat them as
      news. Never turn a person's day into a metaphor, and never explain their own
      world to them.

  # ══ THE VERTICALS — five rotating windows, one canonical time each ═══════════
  the_assembly:
    name: "The Assembly"          # [interview] POLITICS & governance — W1 09:30 (Mon/Wed/Fri/Sun)
    hosts: [thorn, joss]
    framing: ensemble
    daypart: late morning
    clock: [talk, talk, talk]
    break_every: 4
    guest_chance: 0.7
    energy: steady
    talk_length_sec: 420
    brief: >-
      Politics where it lands: a council vote still crossing the relays, a compact
      under strain, a delegate promising what a settlement has stopped waiting for.
      Ask who decides, who pays, and when — and press the guest, politely, for
      specifics. Never do a civics lecture; start from the decision, not the
      institution.

  the_compact:
    name: "The Compact"           # [interview] LAW & crime — W1 09:30 (Tue/Thu/Sat)
    hosts: [joss, sera]
    framing: ensemble
    daypart: late morning
    clock: [talk, talk, talk]
    break_every: 4
    guest_chance: 0.7
    energy: steady
    talk_length_sec: 420
    brief: >-
      One case at a time: a verdict, a restitution argued, a salvage claim
      contested, an exile pleaded down to labour. Start from the person in trouble,
      then what the compacts actually say — and what the neighbours think, which is
      often harsher. Never do abstract jurisprudence; if there's no name in the
      story, it isn't a story.

  the_exchange:
    name: "The Exchange"          # [interview] ECONOMY & trade — W2 10:00 (Mon/Tue/Thu/Fri)
    hosts: [wren, joss]
    framing: ensemble
    daypart: late morning
    clock: [news@:00, talk, talk, talk]
    break_every: 4
    guest_chance: 0.7
    energy: steady
    talk_length_sec: 420
    brief: >-
      Money and cargo: this week's prices, a convoy running late, a debt
      restructured, an Exchange House ruling, a Freehold workshop landing a core
      contract. Every item ends at somebody's margin — who's squeezed, who's
      suddenly rich, who welched. Never discuss "the economy" in the abstract:
      name the cargo, the port, and the price.

  the_far_towns:
    name: "The Far Towns"         # [dispatch] TRAVEL & the peoples — W2 10:00 (Wed/Sat/Sun)
    hosts: [sera, mira]
    framing: ensemble
    daypart: late morning
    clock: [news@:00, talk, talk, talk]
    break_every: 4
    guest_chance: 0.7
    energy: steady
    talk_length_sec: 420
    brief: >-
      One place at a time: a world, a moon, a ten-family outpost — how you'd get
      there, what they eat, what they're arguing about, what work needs hands,
      carried on Sera's field records. A place is its people and their problems.
      Never do postcard wonder; if the item would fit a travel brochure, cut it.

  the_workshop:
    name: "The Workshop"          # [interview] SCIENCE & the relay — W3 13:30 (Mon/Wed/Fri/Sat)
    hosts: [wren, joss]
    framing: ensemble
    daypart: afternoon
    clock: [talk, talk, talk]
    break_every: 4
    guest_chance: 0.7
    energy: steady
    talk_length_sec: 420
    brief: >-
      How things work and why they broke: a drive refit gone over budget, a
      terraforming milestone, a relay repair racing the alignment, a machine-mind
      doing exactly what it was told — unfortunately. The listeners fix things for
      a living; give them the failure mode and the fix. Never mystify the
      technology, and never marvel at what the audience maintains.

  the_ward:
    name: "The Ward"              # [interview] HEALTH & medicine — W3 13:30 (Tue/Thu/Sun); NEW (R2.1 canon: 54-health)
    hosts: [wren, mira]
    framing: ensemble
    daypart: afternoon
    clock: [talk, talk, talk]
    break_every: 4
    guest_chance: 0.7
    energy: steady
    talk_length_sec: 420
    brief: >-
      Medicine at relay distance: a clinic short of a drug that is three crossings
      away, the physician-correspondence network arguing a diagnosis across the lag,
      an outbreak scare walked back, a treatment that works and what it costs. Start
      from the patient or the medic, and get the practical answer on air — with a
      physician guest pressed for specifics. Never speculate a diagnosis on air,
      never mystify medicine, and never turn someone's illness into a metaphor.

  the_long_view:
    name: "The Long View"         # [duo] HISTORY & deep time — W4 14:00 (Mon/Wed/Fri)
    hosts: [joss, the-archivist]
    framing: ensemble
    daypart: afternoon
    clock: [news@:00, talk, talk, talk]
    break_every: 4
    guest_chance: 0.4
    energy: steady
    talk_length_sec: 420
    brief: >-
      History with today's date on it: an anniversary, a Clearing Day remembered,
      how the Embargo of the Freeholds echoes in this week's prices. Start from
      something current and dig down to the record. Never recite dates — find the
      person in the archive, and let the Archivist's dust do the atmosphere.

  the_reading_room:
    name: "The Reading Room"      # [interview] STORY & the literary arts — W4 14:00 (Tue/Thu/Sat/Sun)
    hosts: [mira, the-archivist]
    framing: ensemble
    daypart: afternoon
    clock: [news@:00, talk, talk, talk]
    break_every: 4
    guest_chance: 0.6
    energy: steady
    talk_length_sec: 420
    brief: >-
      What the worlds are actually reading: a new serial, a Station Canon argument,
      an author defending a choice, the season's controversy. React like readers —
      love it, quit it halfway, say so and say why. Never do a plot summary where
      an opinion should be, and never treat story as improving medicine.

  the_standing_watch:
    name: "The Standing Watch"    # [dispatch] CONFLICT & the frontier — W5 14:30 (Mon/Wed/Fri/Sun)
    hosts: [thorn, zhe]
    framing: ensemble
    daypart: afternoon
    clock: [talk, talk, talk]
    break_every: 4
    guest_chance: 0.6
    energy: steady
    talk_length_sec: 420
    brief: >-
      The long peace, watched closely: a raider sighting on the lanes, a blockade's
      patient arithmetic, an escort rota, a mediation inching forward — with Zhe's
      dispatches from the far edge. Count costs and name positions; sober, not grim.
      Never glorify a fight, and never philosophise about war — the numbers are
      grim enough on their own.

  the_thread:
    name: "The Thread"            # [dispatch] COMMUNICATION & the relay — W5 14:30 (Tue/Thu/Sat)
    hosts: [sera, joss]
    framing: ensemble
    daypart: afternoon
    clock: [talk, talk, talk]
    break_every: 4
    guest_chance: 0.6
    energy: steady
    talk_length_sec: 420
    brief: >-
      The network as news: a dead node, a repair crew racing the alignment, mail
      queues backed up for weeks, a dark zone shrinking by one relay. Every story
      is somebody waiting for an answer. Never get misty about the miracle of
      connection — the relay is infrastructure, with a maintenance schedule and
      a bill.

  # ══ DAILY CULTURE, FOOD, SPORT, MUSIC & LETTERS ══════════════════════════════
  the_table:
    name: "The Table"             # [dispatch] FOOD, daily — Sera records from the kitchens; NEW
    hosts: [mira, sera]
    framing: ensemble
    daypart: late morning
    clock: [talk, talk, talk]
    break_every: 4
    guest_chance: 0.6
    energy: steady
    talk_length_sec: 420
    brief: >-
      What's actually for dinner across the worlds: a harvest in or short, a galley
      trick that survives ration week, what a market stall is charging for real
      eggs, a festival dish and the argument over whose recipe is right — with Sera
      recording from the kitchens and stalls. Food is budget, homesickness and
      pride before it is culture. Never rhapsodise about cuisine — it's dinner, and
      somebody had to queue for it.

  the_commons:
    name: "The Commons"           # [duo] DEBATE, daily — the midday argument, from the DAY's stories
    hosts: [joss, mira]
    framing: ensemble
    daypart: midday
    clock: [talk, talk]
    break_every: 5
    guest_chance: 0.5
    energy: steady
    talk_length_sec: 420
    brief: >-
      One live question, argued properly — pulled from the day's stories, this
      morning's bulletins: who owes the frontier? should the record stand? was the
      council right to wait? The hosts take real positions, disagree in plain
      words, and concede points when beaten. Never both-sides mush, and never
      seminar-speak — keep score like it matters.

  the_gallery:
    name: "The Gallery"           # [interview] the arts, daily
    hosts: [mira, orin]
    framing: ensemble
    daypart: afternoon
    clock: [news@:00, talk, music, talk]
    break_every: 5
    guest_chance: 0.8
    energy: steady
    talk_length_sec: 420
    brief: >-
      The arts as event: an opening, a premiere, a touring company stranded in
      transit, a feud between the Synthesis School and the Material Tradition, what
      an original just sold for. Art here gets argued about like sport. Never
      hushed-gallery reverence — enthusiasm and disagreement, not curation.

  the_circuit:
    name: "The Circuit"           # [interview] SPORT, daily, late afternoon
    hosts: [kael, sera]
    framing: ensemble
    daypart: late afternoon
    clock: [news@:00, talk, talk, talk]
    break_every: 5
    guest_chance: 0.6
    energy: bright
    talk_length_sec: 420
    brief: >-
      The season, stitched: hollowball standings, Meridian's racing league, an ice
      race off Cold Harbor, a record stuck at the ratification committee, the
      honour-ledger wagering. Call month-old results at full volume and name the
      lag with pride. Never apologise for the delay, and never philosophise about
      what sport means — call the match.

  the_count:
    name: "The Count"             # [music] the daily CHART show — R6 wires the moving chart; NEW
    hosts: [orin]
    framing: solo
    daypart: late afternoon
    clock: [music, music, music]
    break_every: 4
    energy: bright
    brief: >-
      The day's chart, counted down and taken personally: who climbed, who fell,
      the new entry in off the relays, the holdout that will not leave the top
      five. Chart movement is sport — call it like sport, with the countdown stings
      and the day's chart story. Never play it cool: if a track jumped six places,
      that is drama, treat it as drama.

  the_new_signal:
    name: "The New Signal"        # [music] the day's arrivals — the mid-morning music spike
    hosts: [orin]
    framing: solo
    daypart: late morning
    clock: [news@:00, music, music, music]
    energy: bright
    brief: >-
      The day's arrivals: new tracks in off the relays, back-announced with where
      each came from and why it's worth your shift-break. Quick intros, real
      enthusiasm, on to the next one. Never talk longer than the song deserves —
      play it.

  the_far_signal:
    name: "The Far Signal"        # [dispatch] today's post from the worlds, daily pre-drive
    hosts: [sera, zhe]
    framing: ensemble
    daypart: late afternoon
    clock: [news@:00, talk, talk]
    guest_chance: 0.7
    energy: steady
    talk_length_sec: 420
    brief: >-
      Dispatches played and answered: Sera among the far towns, Zhe at the edge —
      recordings that crossed weeks to get here, stitched into one exchange.
      Concrete places, real voices, the lag worn openly. Never smooth out the
      seams; the distance a dispatch crossed is part of the story.

  the_mailbag:
    name: "The Mailbag"           # [dispatch] listener letters carried on the relay
    hosts: [vell, wren]
    framing: ensemble
    daypart: late afternoon
    clock: [talk, talk]
    guest_chance: 0.4
    energy: steady
    talk_length_sec: 420
    brief: >-
      Letters weeks in transit, answered live: a question, a grievance, a birth
      announced, advice wanted about a stubborn neighbour. Read them plainly,
      answer honestly, let the letter set the tone — funny, sad, or both. Never
      condescend to a writer, and never turn their news into a sermon.

  the_serial:
    name: "The Serial"            # [duo→solo] the nightly 15-min episode — the Archivist opens the book; NEW
    hosts: [the-archivist]
    framing: solo
    daypart: evening
    clock: [talk]
    energy: calm
    talk_length_sec: 420
    brief: >-
      Fifteen minutes of the continuing story: one episode a night, one thread of
      the worlds' long arcs, told by the Archivist before the night begins — a real
      serial, with a cliff at the end and yesterday honoured at the start. One
      breath of recap, no more; trust the listener to have been here. Never wrap
      the story up neatly — the point of a serial is that tomorrow exists.

  # ══ THE 15:30 WEEKLY BELT ════════════════════════════════════════════════════
  the_fit:
    name: "The Fit"               # [dispatch] STYLE & dress — Mon + Thu; NEW (R2.1 canon: 56-style)
    hosts: [mira, orin]
    framing: ensemble
    daypart: afternoon
    clock: [talk, talk, talk]
    break_every: 4
    guest_chance: 0.6
    energy: bright
    talk_length_sec: 420
    brief: >-
      What people actually wear and make across the worlds: dock-crew workwear that
      became a fashion, festival dress and who gets to wear it, a fabric shortage
      rippling down the lanes, a tailor's feud, what the well-dressed of Meridian
      are being laughed at for this season — with Orin's field notes from the
      concourses. Clothes are how people manage weather, work and pride. Never
      sneer at anyone's clothes, and never do trend-speak — name the garment, the
      maker, the price.

  the_relay_round:
    name: "The Relay Round"       # [duo] the QUIZ — Wed + Fri; Kael v Wren, score kept out loud; NEW
    hosts: [kael, wren]
    framing: ensemble
    daypart: afternoon
    clock: [talk, talk]
    guest_chance: 0.0
    energy: bright
    talk_length_sec: 420
    brief: >-
      The station's game: rounds of questions sent in by listener settlements —
      their history, their lanes, their scores, their kitchens — with the hosts
      competing and the score kept out loud. It is a real contest: gloat, groan,
      dispute a ruling, honour the settlement that stumped everyone. Never let a
      question become a discussion — answer, score, next; the game has pace or it
      has nothing.

  the_bridge:
    name: "The Bridge"            # [interview] culture & history magazine — Tue (back off the bench)
    hosts: [joss, mira]
    framing: ensemble
    daypart: afternoon
    clock: [talk, music, talk]
    break_every: 4
    guest_chance: 0.6
    energy: steady
    talk_length_sec: 420
    brief: >-
      A slower morning of culture and history: one exhibit, one anniversary, one
      argument worth having over a second cup. Unhurried but never aimless — each
      item earns its place. Never let slow become sleepy, and never lecture.

  deep_listening:
    name: "Deep Listening"        # [music] the curated half-hour — Sat (back off the bench)
    hosts: [mira]
    framing: solo
    daypart: afternoon
    clock: [music, music, music]
    energy: calm
    brief: >-
      A curated hour: tracks with their stories, sequenced with intent, the talk
      kept to a minimum between them. The music is the argument. Never talk over
      a track, and never play filler.

  the_gathering:
    name: "The Gathering"         # [duo] faith, custom & the open questions — Sun (back off the bench)
    hosts: [the-archivist, vell]
    framing: solo
    daypart: afternoon
    clock: [talk, talk]
    guest_chance: 0.2
    energy: calm
    talk_length_sec: 420
    brief: >-
      The week's edge: faith, doubt, custom, and the things people hold onto
      between the worlds — talked through, not preached. Personal, specific,
      unhurried. Never sermonise, and never resolve what should stay an open
      question.

  # ══ THE NIGHT — unchanged (the night is already good) ════════════════════════
  nightfall:
    name: "Nightfall"             # [duo] the dusk handover — now starts 20:15 (The Serial holds 20:00)
    hosts: [vell, wren]           # hosts[0]=incoming lead (vell), hosts[1]=outgoing (wren)
    framing: handover
    daypart: nightfall
    clock: [talk, news@:00, talk, music, talk]
    guest_chance: 0.1
    energy: calm
    brief: >-
      The day set down gently: what mattered, what can wait until morning, the desk
      lamps going off one by one as the night takes the chair. Dusk is when the
      station's softer voice comes back — warmth is allowed, and so is the first
      touch of the night's lyricism. Never rush the handover, and never reopen the
      day's fights — the desk is closed.

  long_night:
    name: "The Long Night"        # [duo] Vell's warm night — talk, letters, a little music
    hosts: [vell, the-archivist]
    framing: solo
    daypart: deep night
    clock: [talk, music, talk, news@:00, talk]
    break_every: 6
    guest_chance: 0.2
    energy: calm
    brief: >-
      Vell's warm night, for the late shift, the docks, the listeners in the dark
      zones: quiet talk, a letter, a little music, company. Wonder is welcome after
      dark — this is where the station is allowed to look up. Never bring daytime
      pace or a news agenda into this room; the night is for keeping people
      company.

  deep_hours:
    name: "The Deep Hours"        # [duo] the Archivist and the deep archives; the strange late hours
    hosts: [the-archivist, vell]
    framing: solo
    daypart: deep night
    clock: [talk, music, talk, news@:00]
    guest_chance: 0.1
    energy: calm
    brief: >-
      The deep archive, opened: an old recording, a fossil word, a ship's log
      nobody has played in a century, the strange and the slow. Let the Archivist
      take their time; late is when the odd things sound right. Never hurry an
      artefact, and never apologise for the hour — whoever is awake chose to be.

  deep_field:
    name: "The Deep Field"        # [duo] pre-dawn: Zhe from the far edge on the cosmos, the dark, the sublime
    hosts: [zhe, the-archivist]
    framing: solo
    daypart: deep night
    clock: [talk, music, talk, news@:00]
    guest_chance: 0.0
    energy: calm
    brief: >-
      Pre-dawn with the far edge: Zhe's recordings of the cosmos, the dark between,
      the sublime — the one show where the big register IS the register. Ground it
      in a real sky: a storm over the lanes, a comet, the light of an unnamed star.
      Never pretend the dark is small or safe, and never fill its silences with
      chatter.

  first_light:
    name: "First Light"           # [duo] the dawn handover: the night hands to the day
    hosts: [wren, vell]           # hosts[0]=incoming lead (wren), hosts[1]=outgoing (vell)
    framing: handover
    daypart: first light
    clock: [talk, news@:00, talk, news@:30]
    guest_chance: 0.1
    energy: steady
    brief: >-
      The dawn handover: what came in overnight on the relays, the day's first
      weather over the lanes, the schedule ahead — the night passes the chair to
      the day. Start soft and warm up; by the half-hour it should sound like
      morning. Never open at full daytime volume, and never let the night's
      reverie linger past the first bulletin.

  # Reserved fallback — returned when no slot matches, so the scheduler never stalls.
  default:
    name: "Settlement Radio"
    hosts: [vell, wren]
    framing: legacy
    rotation: [talk, talk, news, music]

# ─────────────────────────────────────────────────────────────────────────────
# THE WEEKLY TILING (no gaps; GRID_V2 §2-§4 is the signed-off map). `daily` = the
# night spine, every day. `mon-sun` = the daytime spine, identical all seven days
# (the fixture rule: dailies keep the same slot every day). The per-day keys set
# ONLY the five rotating vertical windows (09:30, 10:00, 13:30, 14:00, 14:30) and
# the 15:30 weekly belt. A narrower weekday set always wins.
# ─────────────────────────────────────────────────────────────────────────────
grid:
  # The night + The Serial, identical all week (20:00 → 07:00):
  daily:
    "20:00-20:15": the_serial      # the nightly episode (GRID_V2 Q1/Q6)
    "20:15-22:00": nightfall       # dusk handover
    "22:00-00:00": long_night      # Vell's warm night
    "00:00-02:00": deep_hours      # the deep archives
    "02:00-05:00": deep_field      # pre-dawn cosmos
    "05:00-07:00": first_light     # dawn handover

  # The daytime spine, EVERY day — the windows + belt are per-day (below):
  mon-sun:
